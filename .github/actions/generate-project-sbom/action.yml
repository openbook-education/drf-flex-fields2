name: "Generate project SBOM"
description: "Generate and optionally commit the whole-project CycloneDX SBOM"

inputs:
    commit-changes:
        description: "Whether to commit and push SBOM changes"
        required: false
        default: "true"

    upload-artifact:
        description: "Whether to upload the generated SBOM as workflow artifact"
        required: false
        default: "false"

    commit-message:
        description: "Commit message used when SBOM changes are committed"
        required: false
        default: "chore(sbom): regenerate project sbom"

runs:
    using: "composite"
    steps:
        - name: "Create SBOM output directory"
          shell: bash
          run: mkdir -p sbom

        - name: "Generate CycloneDX SBOM"
          uses: anchore/sbom-action@e22c389904149dbc22b58101806040fa8d37a610 # v0
          with:
              path: "."
              format: "cyclonedx-json"
              output-file: "sbom/openbook.cyclonedx.json"
              upload-artifact: ${{ inputs.upload-artifact }}
              upload-release-assets: false

        - name: "Commit SBOM changes"
          if: ${{ inputs.commit-changes == 'true' }}
          shell: bash
          run: |
              if git diff --quiet -- sbom/openbook.cyclonedx.json; then
                  echo "No SBOM changes detected."
                  exit 0
              fi

              git config user.name "github-actions[bot]"
              git config user.email "41898282+github-actions[bot]@users.noreply.github.com"

              git add sbom/openbook.cyclonedx.json
              git commit -m "${{ inputs.commit-message }}"
              git push
