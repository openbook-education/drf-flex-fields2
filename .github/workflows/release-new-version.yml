name: "Bump version and publish"

on:
    workflow_dispatch:
        inputs:
            bump:
                description: "Version bump type"
                required: true
                default: "patch"
                type: choice
                options:
                    - patch
                    - minor
                    - major
    pull_request:
        types:
            - closed

permissions:
    contents: read

concurrency:
    group: "release-new-version"
    cancel-in-progress: false

jobs:
    release:
        name: "Bump version, tag, and publish"
        if: >-
            ${{
                github.event_name == 'workflow_dispatch' || (
                    github.event.pull_request.merged == true &&
                    github.event.pull_request.base.ref == github.event.repository.default_branch &&
                    contains(github.event.pull_request.labels.*.name, 'minor-update') && (
                        github.event.pull_request.user.login == 'renovate[bot]' ||
                        startsWith(github.event.pull_request.head.ref, 'renovate/')
                    )
                )
            }}
        runs-on: ubuntu-latest
        steps:
            - name: "Determine target branch"
              id: target-branch
              shell: bash
              run: |
                  if [[ "${{ github.event_name }}" == "workflow_dispatch" ]]; then
                      if [[ "${{ github.ref_type }}" != "branch" ]]; then
                          echo "Manual release workflow must be run from a branch, not a tag."
                          echo "Current ref type: ${{ github.ref_type }}, ref name: ${{ github.ref_name }}"
                          exit 1
                      fi

                      # For manual dispatch: github.ref_name is the branch name where the workflow was invoked
                      # This allows running release from any branch (e.g., release-prep branches)
                      target_branch="${{ github.ref_name }}"
                  else
                      # For PR merged: github.event.pull_request.base.ref is the target branch of the PR
                      # (typically the default branch), ensuring releases go to the correct base branch
                      target_branch="${{ github.event.pull_request.base.ref }}"
                  fi

                  is_default_branch="false"
                  if [[ "$target_branch" == "${{ github.event.repository.default_branch }}" ]]; then
                      is_default_branch="true"
                  fi

                  echo "target_branch=$target_branch" >> "$GITHUB_OUTPUT"
                  echo "is_default_branch=$is_default_branch" >> "$GITHUB_OUTPUT"

            - name: "Checkout code"
              uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6
              with:
                  token: ${{ secrets.RENOVATE_TOKEN }}
                  ref: ${{ steps.target-branch.outputs.target_branch }}
                  fetch-depth: 0
                  fetch-tags: true

            - name: "Set up CI environment"
              uses: ./.github/actions/setup-ci-environment
              with:
                  setup-python: "true"
                  configure-git-author: "true"

            - name: "Ensure PyPI token is configured"
              shell: bash
              env:
                  POETRY_PYPI_TOKEN_PYPI: ${{ secrets.POETRY_PYPI_TOKEN_PYPI }}
                  POETRY_PYPI_TOKEN_TESTPYPI: ${{ secrets.POETRY_PYPI_TOKEN_TESTPYPI }}
              run: |
                  if [[ "${{ steps.target-branch.outputs.is_default_branch }}" == "true" ]]; then
                      if [[ -z "$POETRY_PYPI_TOKEN_PYPI" ]]; then
                          echo "Repository secret POETRY_PYPI_TOKEN_PYPI is not configured."
                          exit 1
                      fi
                  else
                      if [[ -z "$POETRY_PYPI_TOKEN_TESTPYPI" ]]; then
                          echo "Repository secret POETRY_PYPI_TOKEN_TESTPYPI is not configured."
                          exit 1
                      fi
                  fi

            # Safety guard for manual workflow runs. When the workflow runs for PRs, the tests
            # normally should already have passed. But running the tests is cheap, so to be extra
            # safe, we simply run them again here, before going on with the release.
            - name: "Run tests"
              uses: ./.github/workflows/run-tests-full.yml

            - name: "Bump version, commit, and tag release"
              id: version
              shell: bash
              run: |
                  if [[ "${{ github.event_name }}" == "workflow_dispatch" ]]; then
                      bump_part="${{ github.event.inputs.bump }}"
                  else
                      bump_part="patch"
                  fi

                  previous_version="$(poetry version --short)"

                  if [[ "${{ steps.target-branch.outputs.is_default_branch }}" == "true" ]] && [[ "$previous_version" =~ ^([0-9]+\.[0-9]+\.[0-9]+)-rc\.[0-9]+$ ]]; then
                      new_version="${BASH_REMATCH[1]}"
                      poetry version "$new_version"
                  else
                      poetry version "$bump_part"
                      new_version="$(poetry version --short)"

                      # Add -rc.N suffix if not on default branch
                      if [[ "${{ steps.target-branch.outputs.is_default_branch }}" != "true" ]]; then
                          rc_num=1
                          while git rev-parse "v${new_version}-rc.${rc_num}" >/dev/null 2>&1; do
                              ((rc_num++))
                          done
                          new_version="${new_version}-rc.${rc_num}"
                          poetry version "${new_version}"
                      fi
                  fi

                  release_tag="v${new_version}"

                  if git rev-parse "$release_tag" >/dev/null 2>&1; then
                      echo "Tag $release_tag already exists."
                      exit 1
                  fi

                  echo "previous=$previous_version" >> "$GITHUB_OUTPUT"
                  echo "new=$new_version" >> "$GITHUB_OUTPUT"
                  echo "tag=$release_tag" >> "$GITHUB_OUTPUT"

                  git add pyproject.toml
                  git commit -m "chore(release): $release_tag"
                  git tag "$release_tag"

            - name: "Build and publish package to PyPI Test"
              if: ${{ steps.target-branch.outputs.is_default_branch != 'true' }}
              env:
                  POETRY_PYPI_TOKEN_TEST: ${{ secrets.POETRY_PYPI_TOKEN_TESTPYPI }}
              shell: bash
              run: |
                  poetry config repositories.testpypi https://test.pypi.org/legacy/
                  poetry publish --build --repository testpypi

            - name: "Build and publish package to PyPI"
              if: ${{ steps.target-branch.outputs.is_default_branch == 'true' }}
              env:
                  POETRY_PYPI_TOKEN_PYPI: ${{ secrets.POETRY_PYPI_TOKEN_PYPI }}
              shell: bash
              run: |
                  poetry publish --build

            - name: "Push commit and tag to remote"
              if: success()
              shell: bash
              run: |
                  git push origin "HEAD:${{ steps.target-branch.outputs.target_branch }}"
                  git push origin "${{ steps.version.outputs.tag }}"
