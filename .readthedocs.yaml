version: 2

build:
    os: ubuntu-lts-latest
    tools:
        python: latest
    jobs:
        post_create_environment:
            - pip install poetry
            - poetry config virtualenvs.create false
        install:
            - source $READTHEDOCS_VIRTUALENV_PATH/bin/activate
            - poetry install --no-interaction --with docs

sphinx:
    configuration: docs/conf.py

formats:
  - pdf
  - epub
