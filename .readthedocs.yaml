version: 2

build:
    os: ubuntu-24.04
    tools:
        python: "3.13"
    jobs:
        post_create_environment:
            - pip install poetry
            - poetry config virtualenvs.create false
        post_install:
            - poetry install --no-interaction --with docs

python:
    install:
        - method: pip
          path: .

mkdocs:
    configuration: mkdocs.yml
