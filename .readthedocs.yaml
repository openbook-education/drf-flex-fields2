version: 2

build:
    os: ubuntu-24.04
    tools:
        python: "3.12"
    jobs:
        post_create_environment:
            - pip install poetry
            - poetry config virtualenvs.create false
        post_install:
            - poetry install --no-interaction --with docs
        build:
            - poetry run sphinx-build docs/ $READTHEDOCS_OUTPUT/html

sphinx:
    configuration: docs/conf.py
