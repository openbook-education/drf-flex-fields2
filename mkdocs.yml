site_name: drf-flex-fields2
site_description: Flexible dynamic fields and nested resources for Django REST Framework serializers.
site_url: https://drf-flex-fields2.readthedocs.io/en/latest/
repo_url: https://github.com/openbook-education/drf-flex-fields2
repo_name: openbook-education/drf-flex-fields2
edit_uri: edit/main/doc/
docs_dir: doc
strict: true

theme:
    name: material
    features:
        - content.code.copy
        - navigation.indexes
        - navigation.sections
        - navigation.tabs
        - navigation.top
        - search.highlight
        - search.suggest

plugins:
    - search
    - mkdocstrings:
        handlers:
            python:
                paths:
                    - src
                options:
                    members_order: source
                    separate_signature: true
                    show_root_heading: true
                    show_root_toc_entry: false
                    show_source: false

markdown_extensions:
    - admonition
    - attr_list
    - def_list
    - footnotes
    - md_in_html
    - tables
    - toc:
        permalink: true
    - pymdownx.details
    - pymdownx.highlight:
        anchor_linenums: true
    - pymdownx.inlinehilite
    - pymdownx.snippets
    - pymdownx.superfences
    - pymdownx.tabbed:
        alternate_style: true

watch:
    - src/rest_flex_fields2

nav:
    - Home: index.md
    - Getting Started:
        - Installation: installation.md
        - Quick Start: quickstart.md
    - Guide:
        - Usage: usage.md
        - Serializer Options: serializer-options.md
        - Advanced Topics: advanced.md
    - Reference:
        - API Reference: api-reference.md
        - Changelog: CHANGELOG.md
    - Maintainers:
        - Repository Setup: REPOSITORY-SETUP.md
